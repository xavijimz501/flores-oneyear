<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Carta Para la Reina</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.2/animate.min.css'>

  <script src="https://public.codepenassets.com/js/prefixfree-1.0.7.min.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
  <audio id="background-music" loop>
    <source src="./music.mp3" type="audio/mpeg">
  </audio>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap">





  <div class="container">





    <div class="Lazocoquette">
      <img
        src="https://images.vexels.com/media/users/3/294490/isolated/preview/ba9667f4cb79773875f50a235080d9a9-pajarita-verde-brillante.png"
        alt="cz">
    </div>
    <div class="valentines">





      <div class="envelope"></div>
      <div class="front"></div>

      <div class="card" id="card">

        <div class="hearts">
          <div class="one"></div>
          <div class="two"></div>
          <div class="three"></div>
          <div class="four"></div>
          <div class="five"></div>
        </div>

        <div class="card-face front-face">
          <div class="text">Feliz </br>aniversario </br>mi amor</div>
          <div class="heart">
            <img
              src="https://images.vexels.com/media/users/3/151021/isolated/lists/0a0ba19818cba603cf83d35b5766e654-doodle-de-corazon-hippie.png"
              alt="cz">
          </div>
        </div>

        <div class="card-face back-face">
          <div class="text-back"><br><br> Te hago esta bonita carta con todo mi amor y cariño, para hacer de esta fecha
            un
            momento especial, espero que te guste mucho. </div>
        </div>
      </div>

    </div>
    <div class="shadow"></div>
  </div>

  <!-- Componente index-cara.html bien centrado en la parte de arriba con su leyenda y boton -->
  <div class="bunny-cara-container hidden">
    <div class="box">
      <div class="head">
        <div class="ear-left">
          <div class="inner-ear"></div>
        </div>
        <div class="ear-right">
          <div class="inner-ear"></div>
        </div>
        <div class="eye-left animated pulse">
          <div class="pupil animated pulse"></div>
        </div>
        <div class="eye-right animated pulse">
          <div class="pupil animated pulse"></div>
        </div>
        <div class="nose">
          <div class="line"></div>
        </div>
        <div class="blush-left"></div>
        <div class="blush-right"></div>
      </div>
    </div>
    <div class="bunny-cara-legend">
      <h2>Recibir regalo del conejo florista 🌷</h2>
      <button id="btn-aceptar">Aceptar</button>
    </div>
  </div>

  <!-- Componente index-run.html -->
  <div class="bunny-run-container hidden">
    <div class='rabbit'></div>
    <div class='clouds'></div>
    <div class="bunny-run-legend">
      <h2>El conejito ya va en camino <br>¡ con tu sorpresa ! 🐰🌸</h2>
    </div>
  </div>

  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js'></script>
  <script src="./script.js"></script>

</body>

</html>
