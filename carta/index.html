<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Carta Para la Reina</title>
  <link rel="stylesheet" href="./style.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap">

  <div class="container">
    <div class="Lazocoquette">
      <img
        src="https://images.vexels.com/media/users/3/294490/isolated/preview/ba9667f4cb79773875f50a235080d9a9-pajarita-verde-brillante.png"
        alt="cz">
    </div>
    <div class="valentines">
      <div class="envelope"></div>
      <div class="front"></div>

      <div class="card" id="card">

        <div class="hearts">
          <div class="one"></div>
          <div class="two"></div>
          <div class="three"></div>
          <div class="four"></div>
          <div class="five"></div>
        </div>

        <div class="card-face front-face">
          <div class="text">Feliz </br>aniversario </br>mi amor</div>
          <div class="heart">
            <img
              src="https://images.vexels.com/media/users/3/151021/isolated/lists/0a0ba19818cba603cf83d35b5766e654-doodle-de-corazon-hippie.png"
              alt="cz">
          </div>
        </div>

        <div class="card-face back-face">
          <div class="text">¡Te amo mucho! ❤️</div>
        </div>

      </div>

    </div>
    <div class="shadow"></div>
  </div>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js'></script>
  <script src="./script.js"></script>

</body>

</html>
